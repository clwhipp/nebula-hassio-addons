name: Build and Push Nebula Add-on (amd64)

on:
  push:
    branches:
      - main
    paths:
      - 'nebula_vpn/**'
      - '.github/workflows/build-nebula-addon.yml'
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract add-on version
        id: version
        run: |
          VERSION=$(jq -r '.version' nebula_vpn/config.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push (amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./nebula_vpn
          push: true
          platforms: linux/amd64
          tags: |
            YOUR_DH_USER/nebula-hassio-addon-amd64:latest
            YOUR_DH_USER/nebula-hassio-addon-amd64:${{ steps.version.outputs.version }}
